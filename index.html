<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABCLearning Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="starLayer"></div>

    <!-- 1. IPHONE BOOT -->
    <div id="iphoneBoot" class="ios-layer">
        <img src="https://wikimedia.org" class="ios-logo" alt="Apple">
    </div>

    <!-- 2. HELLO SCREEN -->
    <div id="helloScreen" class="ios-layer" style="display:none;" onclick="enterPortal()">
        <div id="helloText" class="ios-hello">hello</div>
        <div class="ios-bottom-nav">
            <div class="ios-home-bar"></div>
            <p>Swipe up or click to open</p>
        </div>
    </div>

    <!-- 3. ABCLEARNING COVER -->
    <div id="eduScreen" class="ios-layer" style="display:none;">
        <h1 class="edu-title">ABCLearning</h1>
        <div class="ios-loader-container"><div class="ios-loader-fill"></div></div>
        <p class="edu-subtitle">Math • Science • Literature • Social Studies</p>
    </div>

    <!-- 4. TEACHER LOCKOUT -->
    <div id="banScreen" style="display:none;">
        <h1>505 SECURITY ERROR</h1>
        <h2>TEACHER DETECTED</h2>
        <p>Unauthorized access from @legacytraditionalschool.org revoked.</p>
        <input type="password" id="backdoor" onkeydown="unban(event)" placeholder="ADMIN BYPASS">
    </div>

    <!-- 5. LOCK SCREEN -->
    <div id="lockScreen" style="display:none;">
        <div class="lock-box" id="requestState">
            <h1>System Locked</h1>
            <input type="email" id="dummyEmail" placeholder="Student Email">
            <button onclick="fakeRequest()">Request Access</button>
            <p onclick="showPasscodeState()" style="cursor:pointer; font-size:0.8rem; color:#666; margin-top:10px;">Enter Code</p>
        </div>
        <div class="lock-box" id="passcodeState" style="display:none;">
            <h1>Enter Key</h1>
            <input type="password" id="finalCode" placeholder="••••••••">
            <button onclick="checkFinalCode()">Unlock</button>
        </div>
    </div>

    <!-- 6. MAIN HUB -->
    <div id="main" style="display:none;">
        <div id="home" class="page" style="display:block;">
            <h1 id="time">00:00</h1>
            <p>Welcome back, Jorden.</p>
        </div>
        <div id="games" class="page">
            <div class="game-header">
                <button onclick="toggleFS()">🖥️ Full Screen</button>
                <select id="gameMode" onchange="updateMode()">
                    <option value="100">Normal</option>
                    <option value="150">Easy</option>
                    <option value="50">Hard</option>
                </select>
            </div>
            <div class="game-buttons">
                <button onclick="playSnake()">Snake</button>
                <button onclick="playPong()">Pong</button>
                <button onclick="playDodge()">Dodge</button>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <div id="media" class="page">
            <iframe src="https://spotify.com" width="100%" height="152"></iframe>
            <iframe src="https://youtube.com" width="100%" height="300" allowfullscreen></iframe>
        </div>
        <div id="proxy" class="page">
            <div class="search-bar"><input id="proxyInput" placeholder="URL..."><button onclick="launchProxy()">Go</button></div>
            <iframe id="proxyFrame"></iframe>
        </div>
        <div id="settings" class="page">
            <div class="settings-grid">
                <button onclick="cloakTab()">🚀 Ghost Tab</button>
                <button onclick="disguise('Google Docs', 'https://gstatic.com')">🎭 Disguise</button>
                <button onclick="setTheme('light')">⚪ Light Mode</button>
                <button onclick="setTheme('dark')">🌌 Dark Mode</button>
                <hr>
                <input type="range" id="brightSlider" min="10" max="100" value="100" oninput="updateBrightness(this.value)">
                <button onclick="localStorage.clear();location.reload();" style="background:#f44;">Reset Hub</button>
            </div>
        </div>
    </div>

    <!-- 7. NAV DOCK -->
    <div id="dockContainer" style="display:none;">
        <div id="dock">
            <button onclick="openPage('home')">🏠</button>
            <button onclick="openPage('games')">🎮</button>
            <button onclick="openPage('media')">📺</button>
            <button onclick="openPage('proxy')">🌐</button>
            <button onclick="openPage('settings')">⚙️</button>
        </div>
    </div>

    <button id="panicBtn" onclick="panic()">📄 Notes</button>
    <script src="app.js"></script>
</body>
</html>
